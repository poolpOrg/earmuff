# Publishes the VS Code extension on a version tag (e.g. v0.1.0):
# cross-compiles the bundled language server, packages a .vsix, publishes it to
# the VS Code Marketplace and Open VSX, and attaches it to a GitHub Release.
#
# Requires two repository secrets:
#   VSCE_PAT  - Azure DevOps PAT with Marketplace > Manage scope
#   OVSX_PAT  - Open VSX access token
# Each publish step is skipped automatically if its secret is absent, so the
# workflow still produces a .vsix and a Release without any secrets configured.
name: Release Extension

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cross-compile the language server
        run: npm run build-server

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package the .vsix
        run: npx vsce package --no-dependencies --out earmuff.vsix

      - name: Publish to the VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx vsce publish --no-dependencies --packagePath earmuff.vsix

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: npx ovsx publish earmuff.vsix -p "$OVSX_PAT"

      - name: Attach the .vsix to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: editors/vscode/earmuff.vsix
