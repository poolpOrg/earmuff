# Builds and deploys the combined earmuff.io site to GitHub Pages:
#   /        -> the landing page (landing/)
#   /docs/   -> the Hugo documentation site (website/)
# CNAME (earmuff.io) ships at the root.
name: Pages

on:
  push:
    branches: ["main"]
    # The playground bundles a WASM build of the compiler, so changes to the Go
    # sources must redeploy the site too.
    paths:
      - "landing/**"
      - "website/**"
      - ".github/workflows/pages.yml"
      - "**/*.go"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.160.1"
      SITE_BASE: "https://earmuff.io"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build the playground (Go -> WASM)
        run: |
          set -eux
          out=website/static/playground
          mkdir -p "$out"
          GOOS=js GOARCH=wasm go build -trimpath -ldflags="-s -w" \
            -o "$out/earmuff.wasm" ./cmd/earmuff-wasm
          # wasm_exec.js MUST come from the same Go toolchain that built the
          # module, or the runtimes mismatch. Newer Go keeps it under lib/wasm.
          goroot="$(go env GOROOT)"
          if [ -f "$goroot/lib/wasm/wasm_exec.js" ]; then
            cp "$goroot/lib/wasm/wasm_exec.js" "$out/wasm_exec.js"
          else
            cp "$goroot/misc/wasm/wasm_exec.js" "$out/wasm_exec.js"
          fi
          ls -lh "$out"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Vendor playground assets (Monaco, VexFlow) + examples
        run: |
          set -eux
          bash website/scripts/playground-assets.sh
          bash website/scripts/playground-examples.sh

      - name: Install Hugo
        run: |
          curl -sSL -o hugo.deb \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i hugo.deb

      - name: Assemble the site
        run: |
          set -eux
          mkdir -p _site
          # Landing page at the root.
          cp -r landing/. _site/
          # Docs site under /docs (served from earmuff.io/docs/).
          hugo --source website --gc --minify \
            --baseURL "${SITE_BASE}/docs/" --destination "$PWD/_site/docs"
          # Pages does not run Jekyll; keep underscore-prefixed asset dirs.
          touch _site/.nojekyll
          # CNAME at the root (from landing/CNAME).
          test -f _site/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
