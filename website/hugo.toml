baseURL = "https://earmuff.io/docs/"
title = "earmuff"
theme = "hugo-book"

# Book theme settings
disablePathToLower = false
enableGitInfo = false

[params]
  BookTheme = "auto"
  BookToC = true
  BookRepo = "https://github.com/poolpOrg/earmuff"
  BookEditPath = "edit/main/website/content"
  BookSearch = true
  description = "Write music as code — earmuff language documentation."

# A top-of-sidebar link to the interactive playground (it lives outside the
# docs file tree, so it is added to the theme's "before" menu explicitly).
[[menu.before]]
  name = "▶ Playground"
  url = "/playground/"
  weight = 1

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  noClasses = false
  style = "github"
